<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptVault — AIプロンプト共有ライブラリ</title>
  <meta name="description" content="厳選されたAIプロンプトを検索・コピーして、あなたのクリエイティブワークに活用しよう。" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#dde7ff',
              200: '#c2ceff',
              300: '#9db2ff',
              400: '#738ef8',
              500: '#5568f5',
              600: '#4049e9',
              700: '#3339d1',
              800: '#2b30a9',
              900: '#282e84',
            },
          },
          animation: {
            'slide-up': 'slideUp 0.4s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%':   { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --border-color: rgba(255,255,255,0.08);
      --border-hover: rgba(100,120,255,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-primary);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(85,104,245,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(168,85,247,0.08) 0%, transparent 50%);
      min-height: 100vh;
      color: #e2e8f0;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1628; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5578; }

    .gradient-text {
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 40%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-icon {
      background: linear-gradient(135deg, #5568f5, #8b5cf6);
      border-radius: 12px;
      padding: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(85,104,245,0.4);
    }

    .glass-header {
      background: rgba(10,14,26,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
    }

    .search-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-color);
      color: #e2e8f0;
      transition: all 0.2s ease;
    }
    .search-input::placeholder { color: #475569; }
    .search-input:focus {
      outline: none;
      border-color: rgba(85,104,245,0.6);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(85,104,245,0.1);
    }

    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #94a3b8;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn:hover {
      background: rgba(85,104,245,0.15);
      border-color: rgba(85,104,245,0.4);
      color: #a5b4fc;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, rgba(85,104,245,0.3), rgba(139,92,246,0.3));
      border-color: rgba(85,104,245,0.6);
      color: #c7d2fe;
      box-shadow: 0 0 12px rgba(85,104,245,0.2);
    }

    .prompt-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
    }
    .prompt-card.visible {
      animation: slideUp 0.4s ease-out forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .prompt-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(85,104,245,0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .prompt-card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-3px);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.3),
        0 0 0 1px rgba(85,104,245,0.15),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .prompt-card:hover::before { opacity: 1; }

    .category-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .cat-img   { background:rgba(236,72,153,0.15); color:#f9a8d4; border:1px solid rgba(236,72,153,0.25); }
    .cat-txt   { background:rgba(59,130,246,0.15); color:#93c5fd; border:1px solid rgba(59,130,246,0.25); }
    .cat-code  { background:rgba(16,185,129,0.15); color:#6ee7b7; border:1px solid rgba(16,185,129,0.25); }
    .cat-biz   { background:rgba(245,158,11,0.15); color:#fcd34d; border:1px solid rgba(245,158,11,0.25); }
    .cat-idea  { background:rgba(139,92,246,0.15); color:#c4b5fd; border:1px solid rgba(139,92,246,0.25); }
    .cat-mkt   { background:rgba(239,68,68,0.15);  color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
    .cat-def   { background:rgba(100,116,139,0.15);color:#94a3b8; border:1px solid rgba(100,116,139,0.25); }

    .tag-chip {
      font-size: 0.72rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #64748b;
      padding: 2px 9px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-block;
    }
    .tag-chip:hover {
      background: rgba(85,104,245,0.12);
      border-color: rgba(85,104,245,0.3);
      color: #818cf8;
    }

    .prompt-body {
      font-size: 0.85rem;
      line-height: 1.65;
      color: #94a3b8;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-line;
      transition: all 0.3s ease;
    }
    .prompt-body.expanded {
      display: block;
      overflow: visible;
    }

    .copy-btn {
      background: linear-gradient(135deg, #5568f5, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(85,104,245,0.4);
    }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn.copied {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 0 16px rgba(16,185,129,0.35);
    }

    .expand-btn {
      font-size: 0.75rem;
      color: #5568f5;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.2s;
    }
    .expand-btn:hover { color: #818cf8; text-decoration: underline; }

    .card-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    .stats-bar {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }

    .hero-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: #334155;
      text-align: center;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }
    .toast-in  { animation: toastIn  0.3s ease forwards; }
    .toast-out { animation: toastOut 0.25s ease forwards; }
  </style>
</head>

<!-- ===== JAVASCRIPT ===== -->
<script>
(function () {
  'use strict';

  // カテゴリ → CSSクラス
  const CAT_CLASS = {
    '画像生成':     'cat-img',
    'テキスト生成': 'cat-txt',
    'プログラミング':'cat-code',
    'ビジネス':     'cat-biz',
    '企画・アイデア':'cat-idea',
    'マーケティング':'cat-mkt',
  };
  function getCatClass(c){ return CAT_CLASS[c]||'cat-def'; }

  function esc(s){
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // RFC4180 CSV パーサー
  function parseCSV(text){
    const rows=[]; let cur='',inQ=false,row=[];
    for(let i=0;i<text.length;i++){
      const c=text[i],n=text[i+1];
      if(inQ){
        if(c==='"'&&n==='"'){cur+='"';i++;}
        else if(c==='"'){inQ=false;}
        else{cur+=c;}
      } else {
        if(c==='"'){inQ=true;}
        else if(c===','){row.push(cur);cur='';}
        else if(c==='\n'||(c==='\r'&&n==='\n')){
          if(c==='\r')i++;
          row.push(cur);cur='';rows.push(row);row=[];
        } else{cur+=c;}
      }
    }
    if(cur||row.length){row.push(cur);rows.push(row);}
    if(rows.length<2)return[];
    const hdrs=rows[0].map(h=>h.trim());
    return rows.slice(1).filter(r=>r.some(c=>c.trim())).map(r=>{
      const o={};hdrs.forEach((h,i)=>{o[h]=(r[i]||'').trim();});return o;
    });
  }

  // 状態
  let allPrompts=[],activeCategory=null,activeTags=new Set(),searchQuery='';

  // DOM
  const grid=document.getElementById('card-grid');
  const loadingEl=document.getElementById('loading-state');
  const emptyEl=document.getElementById('empty-state');
  const catFiltersEl=document.getElementById('category-filters');
  const tagFiltersEl=document.getElementById('tag-filters');
  const resultCountEl=document.getElementById('result-count');
  const countBadgeEl=document.getElementById('count-badge');
  const resetBtn=document.getElementById('reset-btn');
  const searchInput=document.getElementById('search-input');
  const searchMobile=document.getElementById('search-input-mobile');

  // フィルター構築
  function buildFilters(prompts){
    const cats=[...new Set(prompts.map(p=>p.Category).filter(Boolean))];
    const tags=[...new Set(prompts.flatMap(p=>(p.Tags||'').split(',').map(t=>t.trim()).filter(Boolean)))];

    catFiltersEl.innerHTML='';
    const allBtn=makeBtn('すべて',()=>{activeCategory=null;renderAll();setActiveBtn(catFiltersEl,allBtn);},true);
    catFiltersEl.appendChild(allBtn);
    cats.forEach(cat=>{
      const btn=makeBtn(cat,()=>{activeCategory=cat;renderAll();setActiveBtn(catFiltersEl,btn);});
      catFiltersEl.appendChild(btn);
    });

    tagFiltersEl.innerHTML='';
    tags.forEach(tag=>{
      const btn=document.createElement('button');
      btn.className='filter-btn text-xs px-3 py-1.5 rounded-full';
      btn.textContent='#'+tag;
      btn.dataset.tag=tag;
      btn.addEventListener('click',()=>{
        if(activeTags.has(tag)){activeTags.delete(tag);btn.classList.remove('active');}
        else{activeTags.add(tag);btn.classList.add('active');}
        renderAll();
      });
      tagFiltersEl.appendChild(btn);
    });
  }

  function makeBtn(label,onClick,isActive=false){
    const btn=document.createElement('button');
    btn.className='filter-btn text-xs px-3 py-1.5 rounded-full'+(isActive?' active':'');
    btn.textContent=label;
    btn.addEventListener('click',onClick);
    return btn;
  }

  function setActiveBtn(parent,activeEl){
    parent.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    activeEl.classList.add('active');
  }

  // フィルタリング
  function filterPrompts(){
    return allPrompts.filter(p=>{
      const q=searchQuery.toLowerCase();
      const ms=!q||(p.Title||'').toLowerCase().includes(q)||(p.Prompt||'').toLowerCase().includes(q)||(p.Tags||'').toLowerCase().includes(q)||(p.Category||'').toLowerCase().includes(q);
      const mc=!activeCategory||p.Category===activeCategory;
      const pt=(p.Tags||'').split(',').map(t=>t.trim());
      const mt=activeTags.size===0||[...activeTags].every(t=>pt.includes(t));
      return ms&&mc&&mt;
    });
  }

  // カード生成
  function createCard(p,idx){
    const card=document.createElement('article');
    card.className='prompt-card p-5 flex flex-col gap-3';
    card.style.animationDelay=Math.min(idx*60,400)+'ms';

    const catCls=getCatClass(p.Category);
    const tags=(p.Tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    const promptText=(p.Prompt||'').replace(/\\n/g,'\n');

    const tagsHtml=tags.map(t=>`<span class="tag-chip" data-tag="${esc(t)}">#${esc(t)}</span>`).join('');

    card.innerHTML=`
      <div class="flex items-start justify-between gap-2">
        <span class="category-badge ${catCls}">${esc(p.Category||'不明')}</span>
        <svg class="w-4 h-4 text-slate-700 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <h2 class="text-white font-semibold text-base leading-snug">${esc(p.Title||'無題')}</h2>
      ${tags.length?`<div class="flex flex-wrap gap-1.5">${tagsHtml}</div>`:''}
      <hr class="card-divider"/>
      <div class="flex-1 flex flex-col gap-2">

  async function loadCSV(){
    // まず fetch を試みる（HTTP サーバー経由の場合）
    try {
      const res=await fetch('./prompts.csv');
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      allPrompts=parseCSV(text);
    } catch(err){
      // fetch 失敗時はインラインデータを使用
      console.info('fetch failed, using inline data:', err.message);
      allPrompts=parseCSV(INLINE_CSV);
    }
    loadingEl.classList.add('hidden');
    buildFilters(allPrompts);
    renderAll();
  }

  loadCSV();
})();
</script>
